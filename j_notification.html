<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Ichalkaranji Route Attendance Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background-color: #f4f6f8; display: flex; margin:0; }
.sidebar { width:250px; height:100vh; background:#3a3b3c; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; }
.sidebar h2 { color:#4cd137; text-align:center; margin-bottom:30px; font-size:20px; }
.sidebar a { text-decoration:none; color:white; padding:12px; margin:6px 0; border-radius:8px; background:#4d4d4d; text-align:center; transition:0.3s; font-weight:500; }
.sidebar a:hover { background:#4cd137; color:#1e1e2f; transform:scale(1.05); }
.sidebar a.active { background:#4cd137; color:#1e1e2f; }
.sidebar .back-home { margin-top:auto; background:#34495e; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.sidebar .back-home:hover { background:#1abc9c; color:#2c3e50; }
.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); }
.table-container { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
h2 { text-align:center; margin-bottom:20px; }
.action-btns { display:flex; justify-content:flex-end; gap:10px; margin-bottom:15px; }
button { border:none; border-radius:6px; padding:8px 15px; color:white; font-weight:500; cursor:pointer; }
.download-btn { background:#3498db; } .download-btn:hover { background:#2e86c1; }
.pdf-btn { background:#e74c3c; } .pdf-btn:hover { background:#c0392b; }
#searchInput { margin-bottom:10px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚌 Ichalkaranji Route</h2><br>
  <a href="j_regi_no10.html">Student Records</a>
  <a href="j_atten_no10.html" class="active">Attendance</a>
  <a href="j_bus_schedule.html">Bus Schedule</a>
  
  <hr style="border-color: rgba(255,255,255,0.2);">
  <a href="admin_dashbord.html" class="back-home">⬅️ Back to Home</a>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="table-container">
    <h2>🗓️ Ichalkaranji Route Attendance Management</h2>

    <div class="action-btns">
      <button class="download-btn" onclick="downloadAttendance()">⬇️ Download CSV</button>
      <button class="pdf-btn" onclick="downloadPDF()">📄 Download PDF</button>
    </div>

    <input type="text" id="searchInput" class="form-control" placeholder="Search by name or mobile...">

    <div class="mb-3">
      <label for="attendanceDate" class="form-label fw-bold">Select Date (optional):</label>
      <input type="date" id="attendanceDate" class="form-control" value="">
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle" id="attendanceTable">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
document.getElementById("attendanceDate").value = new Date().toISOString().split("T")[0];

function loadAttendance() {
  const dateFilter = document.getElementById("attendanceDate").value;
  const tbody = document.getElementById("attendanceTableBody");
  const attendanceData = JSON.parse(localStorage.getItem("ichalkaranji_attendance")) || {};
  
  let records = [];
  Object.values(attendanceData).forEach(user => {
    user.forEach(att => {
      if(!dateFilter || att.date === dateFilter) records.push(att);
    });
  });

  if(!records.length){
    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No records found.</td></tr>`;
    return;
  }

  tbody.innerHTML = records.map((r, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.mobile}</td>
      <td>${r.date}</td>
      <td>${r.status === 'Present' ? '✅ Present' : '❌ Absent'}</td>
    </tr>`).join("");
}

// Search filter
document.getElementById("searchInput").addEventListener("input", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#attendanceTableBody tr");
  rows.forEach(row => {
    const name = row.children[1].innerText.toLowerCase();
    const mobile = row.children[2].innerText.toLowerCase();
    row.style.display = name.includes(filter) || mobile.includes(filter) ? "" : "none";
  });
});

document.getElementById("attendanceDate").addEventListener("change", loadAttendance);
window.onload = loadAttendance;

// Download CSV
function downloadAttendance() {
  const rows = document.querySelectorAll("#attendanceTable tbody tr");
  if (!rows.length || rows[0].children[0].innerText.includes("No records")) {
    alert("No attendance data available!");
    return;
  }

  let csv = "Name,Mobile,Date,Status\n";
  rows.forEach(r => {
    if(r.style.display === "none") return;
    const cols = r.querySelectorAll("td");
    csv += `${cols[1].innerText},${cols[2].innerText},${cols[3].innerText},${cols[4].innerText}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ichalkaranji_attendance_${document.getElementById("attendanceDate").value || 'all'}.csv`;
  a.click();
}

// Download PDF
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(14);
  doc.text("Ichalkaranji Route Attendance Records", 105, 15, null, null, "center");

  const rows = [];
  const tableRows = document.querySelectorAll("#attendanceTableBody tr");

  tableRows.forEach((r) => {
    if(r.style.display === "none") return;
    const cols = r.querySelectorAll("td");
    rows.push([cols[0].innerText, cols[1].innerText, cols[2].innerText, cols[3].innerText, cols[4].innerText]);
  });

  doc.autoTable({
    head: [["#", "Name", "Mobile", "Date", "Status"]],
    body: rows,
    startY: 20,
  });

  doc.save(`ichalkaranji_attendance_${document.getElementById("attendanceDate").value || 'all'}.pdf`);
}
</script>

</body>
</html>
