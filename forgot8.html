<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#1e1e2f;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  background:#2c2f38;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

h2{
  color:#4cd137;
}

p{
  font-size:13px;
  color:#ccc;
}

input{
  width:100%;
  padding:10px;
  margin-top:15px;
  border-radius:8px;
  border:none;
  background:#1e1e2f;
  color:#fff;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#4cd137;
  color:#1e1e2f;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#3ebc29;
}

.result{
  margin-top:15px;
  font-size:14px;
  padding:8px;
  border-radius:6px;
  display:none;
}

.success{
  background:#d4edda;
  color:#155724;
}

.error{
  background:#f8d7da;
  color:#721c24;
}

.back{
  margin-top:10px;
  display:block;
  color:#aaa;
  text-decoration:none;
  font-size:13px;
}

.back:hover{color:#fff;}
</style>

</head>
<body>

<div class="container">

  <h2>Forgot Password</h2>

  <p>Enter your registered email to get your password</p>

  <input type="text" id="email" placeholder="Enter Email">

  <button onclick="resetPassword()">Get Password</button>

  <!-- Result Message -->
  <div id="result" class="result"></div>

  <a href="login_08.html" class="back">⬅ Back to Login</a>

</div>

<script>
function resetPassword(){
  let email = document.getElementById("email").value.trim();
  let result = document.getElementById("result");

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.email === email);

  result.style.display = "block";

  if(user){
    result.className = "result success";
    result.innerText = "Your Password is: " + user.password;
  } else {
    result.className = "result error";
    result.innerText = "Email not found!";
  }
}
</script>

</body>
</html>
