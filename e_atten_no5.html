<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Attendance Records (Malkapur Route)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family:'Poppins',sans-serif;
      background-color:#f4f6f8;
      display:flex;
      margin:0;
    }

    .sidebar{
      width:250px;
      height:100vh;
      background:#3a3b3c;
      color:white;
      display:flex;
      flex-direction:column;
      padding:20px;
      position:fixed;
    }

    .sidebar h2{
      color:#4cd137;
      text-align:center;
      margin-bottom:30px;
      font-size:20px;
    }

    .sidebar a{
      text-decoration:none;
      color:white;
      padding:12px;
      margin:6px 0;
      border-radius:8px;
      background:#4d4d4d;
      text-align:center;
      transition:0.3s;
      font-weight:500;
    }

    .sidebar a:hover{
      background:#4cd137;
      color:#1e1e2f;
      transform:scale(1.05);
    }

    .sidebar a.active{
      background:#4cd137;
      color:#1e1e2f;
    }

    .sidebar .back-home{
      margin-top:auto;
      background:#34495e;
      padding:10px;
      border-radius:6px;
      text-align:center;
      font-weight:bold;
    }

    .main-content{
      margin-left:250px;
      padding:30px;
      width:calc(100% - 250px);
    }

    .table-container{
      background:white;
      border-radius:12px;
      padding:25px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .chart-wrapper{
      position:relative;
      width:100%;
      height:400px;
      margin-top:25px;
      background:#fff;
      border-radius:10px;
      padding:15px;
    }

    canvas{
      width:100% !important;
      height:100% !important;
    }

    .action-btns{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:15px;
    }

    button{
      border:none;
      border-radius:6px;
      padding:8px 15px;
      color:white;
      font-weight:500;
      cursor:pointer;
    }

    .download-btn{
      background:#3498db;
    }

    .pdf-btn{
      background:#e74c3c;
    }

    #searchInput{
      margin-bottom:10px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>🚌 Malkapur Bus</h2><br>
  <a href="e_regi_no5.html">Student Records</a>
  <a href="e_atten_no5.html" class="active">Attendance</a>
  <a href="e_bus_schedule.html">Bus Schedule</a>
  <br>
  <hr style="border-color: rgba(255,255,255,0.2);">
  <a href="admin_dashbord.html" class="back-home">⬅️ Back to Home</a>
</div>

<div class="main-content">
  <div class="table-container">

    <h2 class="text-center mb-4">🗓️ Attendance Management - Malkapur Route</h2>

    <div class="mb-3">
      <label class="form-label fw-bold">Select Chart Type:</label>
      <select id="chartType" class="form-control">
        <option value="bar">Daily Attendance Bar Chart</option>
        <option value="line">Weekly Attendance Line Chart</option>
      </select>
    </div>

    <div class="chart-wrapper">
      <canvas id="attendanceChart"></canvas>
    </div>

    <div class="action-btns mt-3">
      <button class="download-btn" onclick="downloadAttendance()">⬇️ Download CSV</button>
      <button class="pdf-btn" onclick="downloadPDF()">📄 Download PDF</button>
    </div>

    <input type="text" id="searchInput" class="form-control" placeholder="Search by name or mobile...">

    <div class="mb-3 mt-3">
      <label for="attendanceDate" class="form-label fw-bold">Select Date (optional):</label>
      <input type="date" id="attendanceDate" class="form-control">
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle" id="attendanceTable">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
document.getElementById("attendanceDate").value = new Date().toISOString().split("T")[0];

let attendanceChart;

// ================= LOAD ONLY MALKAPUR ROUTE =================
function loadAttendance() {
  const dateFilter = document.getElementById("attendanceDate").value;
  const tbody = document.getElementById("attendanceTableBody");

  const attendanceData = JSON.parse(localStorage.getItem("attendance")) || {};

  let records = [];

  Object.values(attendanceData).forEach(student => {
    student.forEach(att => {

      // ONLY MALKAPUR ROUTE
      if (
        att.route === "malkapur" &&
        (!dateFilter || att.date === dateFilter)
      ) {
        records.push(att);
      }

    });
  });

  records.sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!records.length) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center text-muted">
          No Malkapur attendance records found.
        </td>
      </tr>
    `;
    generateChart([]);
    return;
  }

  tbody.innerHTML = records.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${r.name}</td>
      <td>${r.mobile}</td>
      <td>${r.date}</td>
      <td>${r.status === "Present" ? "✅ Present" : "❌ Absent"}</td>
    </tr>
  `).join("");

  generateChart(records);
}

// ================= CHART =================
function generateChart(records) {
  const chartType = document.getElementById("chartType").value;

  let labels = [];
  let presentCounts = [];
  let absentCounts = [];

  if (!records.length) {
    labels = ["No Data"];
    presentCounts = [0];
    absentCounts = [0];
  } else {
    const groupedData = {};

    records.forEach(r => {
      let key = r.date;

      if (chartType === "line") {
        const d = new Date(r.date);
        d.setDate(d.getDate() - d.getDay());
        key = d.toISOString().split("T")[0];
      }

      if (!groupedData[key]) {
        groupedData[key] = { present: 0, absent: 0 };
      }

      if (r.status === "Present") groupedData[key].present++;
      else groupedData[key].absent++;
    });

    labels = Object.keys(groupedData).sort((a,b)=>new Date(a)-new Date(b));

    presentCounts = labels.map(label => groupedData[label].present);
    absentCounts = labels.map(label => groupedData[label].absent);
  }

  const ctx = document.getElementById("attendanceChart").getContext("2d");

  if (attendanceChart) attendanceChart.destroy();

  attendanceChart = new Chart(ctx, {
    type: chartType,
    data: {
      labels,
      datasets: [
        {
          label: "Present",
          data: presentCounts,
          backgroundColor: "rgba(76,209,55,0.5)",
          borderColor: "#4cd137",
          borderWidth: 2
        },
        {
          label: "Absent",
          data: absentCounts,
          backgroundColor: "rgba(231,76,60,0.5)",
          borderColor: "#e74c3c",
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

// ================= SEARCH =================
document.getElementById("searchInput").addEventListener("input", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#attendanceTableBody tr");

  rows.forEach(row => {
    const name = row.children[1]?.innerText.toLowerCase() || "";
    const mobile = row.children[2]?.innerText.toLowerCase() || "";

    row.style.display =
      (name.includes(filter) || mobile.includes(filter)) ? "" : "none";
  });
});

// ================= CSV =================
function downloadAttendance() {
  let csv = "Name,Mobile,Date,Status\n";

  document.querySelectorAll("#attendanceTableBody tr").forEach(r => {
    if (r.style.display === "none") return;

    const cols = r.querySelectorAll("td");

    if (cols.length >= 5) {
      csv += `${cols[1].innerText},${cols[2].innerText},${cols[3].innerText},${cols[4].innerText}\n`;
    }
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "malkapur_attendance.csv";
  a.click();
}

// ================= PDF =================
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Malkapur Attendance Records", 70, 10);

  const rows = [];

  document.querySelectorAll("#attendanceTableBody tr").forEach(r => {
    if (r.style.display === "none") return;

    const cols = r.querySelectorAll("td");

    if (cols.length >= 5) {
      rows.push([
        cols[0].innerText,
        cols[1].innerText,
        cols[2].innerText,
        cols[3].innerText,
        cols[4].innerText
      ]);
    }
  });

  doc.autoTable({
    head: [["#", "Name", "Mobile", "Date", "Status"]],
    body: rows,
    startY: 20
  });

  doc.save("malkapur_attendance.pdf");
}

// ================= EVENTS =================
document.getElementById("attendanceDate").addEventListener("change", loadAttendance);
document.getElementById("chartType").addEventListener("change", loadAttendance);

window.onload = loadAttendance;
</script>

</body>
</html>
