<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Attendance Records (Radhanagari Route)</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  background-color:#f4f6f8;
  display:flex;
  margin:0;
}

.sidebar{
  width:250px;
  height:100vh;
  background:#3a3b3c;
  color:white;
  display:flex;
  flex-direction:column;
  padding:20px;
  position:fixed;
}

.sidebar h2{
  color:#4cd137;
  text-align:center;
  margin-bottom:30px;
  font-size:20px;
}

.sidebar a{
  text-decoration:none;
  color:white;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  background:#4d4d4d;
  text-align:center;
  transition:0.3s;
  font-weight:500;
}

.sidebar a:hover{
  background:#4cd137;
  color:#1e1e2f;
  transform:scale(1.05);
}

.sidebar a.active{
  background:#4cd137;
  color:#1e1e2f;
}

.sidebar .back-home{
  margin-top:auto;
  background:#34495e;
  padding:10px;
  border-radius:6px;
  text-align:center;
  font-weight:bold;
}

.sidebar .back-home:hover{
  background:#1abc9c;
  color:#2c3e50;
}

.main-content{
  margin-left:250px;
  padding:30px;
  width:calc(100% - 250px);
}

.table-container{
  background:white;
  border-radius:12px;
  padding:25px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.chart-wrapper{
  position:relative;
  width:100%;
  height:400px;
  margin-top:25px;
  background:#fff;
  border-radius:10px;
  padding:15px;
}

canvas{
  width:100% !important;
  height:100% !important;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚌 Bus No. 2</h2><br>
  <a href="radha_stud_form.html">Student Records</a>
  <a href="radha_admin_attendance.html" class="active">Attendance</a>
  <a href="radha_bus_Routes_Schedule.html">Bus Schedule</a>
  <br>
  <hr style="border-color: rgba(255,255,255,0.2);">
  <a href="radha_dashboard.html" class="back-home">⬅️ Back to Home</a>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="table-container">

    <h2>🗓️ Attendance Management - Radhanagari Route</h2>

    <div class="mb-3">
      <label class="form-label fw-bold">Select Chart Type:</label>
      <select id="chartType" class="form-control">
        <option value="bar">Daily Attendance Bar Chart</option>
        <option value="line">Weekly Attendance Line Chart</option>
      </select>
    </div>

    <div class="chart-wrapper">
      <canvas id="attendanceChart"></canvas>
    </div>

    <input type="text" id="searchInput" class="form-control mt-3" placeholder="Search by name or mobile...">

    <div class="mb-3 mt-2">
      <label class="form-label fw-bold">Select Date (optional):</label>
      <input type="date" id="attendanceDate" class="form-control">
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle" id="attendanceTable">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
document.getElementById("attendanceDate").value =
  new Date().toISOString().split("T")[0];

let attendanceChart;

// ================= LOAD RADHANAGARI ATTENDANCE =================
function loadAttendance() {

  const dateFilter = document.getElementById("attendanceDate").value;
  const tbody = document.getElementById("attendanceTableBody");

  // ✅ SAME KEY AS DRIVER PAGE
  const attendanceData = JSON.parse(localStorage.getItem("attendance")) || {};

  let records = [];

  Object.keys(attendanceData).forEach(mobile => {
    attendanceData[mobile].forEach(att => {

      if (!dateFilter || att.date === dateFilter) {
        records.push({
          name: att.name,
          mobile: att.mobile,
          date: att.date,
          status: att.status
        });
      }

    });
  });

  records.sort((a, b) => new Date(a.date) - new Date(b.date));

  if (!records.length) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center text-muted">
          No Radhanagari attendance records found.
        </td>
      </tr>
    `;
    generateChart([]);
    return;
  }

  tbody.innerHTML = records.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${r.name}</td>
      <td>${r.mobile}</td>
      <td>${r.date}</td>
      <td>${r.status === "Present" ? "✅ Present" : "❌ Absent"}</td>
    </tr>
  `).join("");

  generateChart(records);
}

// ================= CHART =================
function generateChart(records) {

  const chartType = document.getElementById("chartType").value;

  let labels = [];
  let presentCounts = [];
  let absentCounts = [];

  if (!records.length) {
    labels = ["No Data"];
    presentCounts = [0];
    absentCounts = [0];
  } else {

    const dailyData = {};

    records.forEach(r => {
      if (!dailyData[r.date]) {
        dailyData[r.date] = { present: 0, absent: 0 };
      }

      if (r.status === "Present") {
        dailyData[r.date].present++;
      } else {
        dailyData[r.date].absent++;
      }
    });

    labels = Object.keys(dailyData).sort((a, b) => new Date(a) - new Date(b));

    presentCounts = labels.map(d => dailyData[d].present);
    absentCounts = labels.map(d => dailyData[d].absent);
  }

  const ctx = document.getElementById("attendanceChart").getContext("2d");

  if (attendanceChart) attendanceChart.destroy();

  attendanceChart = new Chart(ctx, {
    type: chartType,
    data: {
      labels: labels,
      datasets: [
        {
          label: "Present",
          data: presentCounts,
          backgroundColor: "rgba(76, 209, 55, 0.5)",
          borderColor: "#4cd137",
          borderWidth: 3
        },
        {
          label: "Absent",
          data: absentCounts,
          backgroundColor: "rgba(231, 76, 60, 0.5)",
          borderColor: "#e74c3c",
          borderWidth: 3
        }
      ]
    }
  });
}

// ================= SEARCH =================
document.getElementById("searchInput").addEventListener("input", function () {
  const filter = this.value.toLowerCase();

  document.querySelectorAll("#attendanceTableBody tr").forEach(row => {
    row.style.display =
      row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});

// ================= EVENTS =================
document.getElementById("attendanceDate").addEventListener("change", loadAttendance);
document.getElementById("chartType").addEventListener("change", loadAttendance);

window.onload = loadAttendance;
</script>

</body>
</html>
