<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radhanagari Notifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      margin: 0;
      background: #f8f9fa;
      color: #212529;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #343a40;
      color: white;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding-top: 20px;
    }
    .sidebar h4 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
    }
    .sidebar a {
      display: block;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      font-size: 15px;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #495057;
    }

    /* Main Content */
    .main-content {
      margin-left: 220px;
      padding: 20px;
      width: calc(100% - 220px);
      min-height: 100vh;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .notification-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-left: 6px solid #343a40;
      transition: background 0.3s, transform 0.3s;
    }

    .notification-card:hover {
      background: #f1f3f5;
      transform: translateY(-2px);
    }

    .notification-card h5 {
      margin-bottom: 5px;
      color: #212529;
    }

    .notification-card small {
      color: #6c757d;
    }

    .no-notifications {
      text-align: center;
      color: #6c757d;
      font-style: italic;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <<div class="sidebar">
    <h4>Menu</h4>
    <a href="koto_dashboard.html">🏠 Dashboard</a>
    <a href="koto_stud_form.html">📝 Student Registration</a>
    <a href="koto_Bus_Routes_Schedule.html">🚌 Bus Routes</a>
    <a href="koto_driver_details.html">👨‍✈️ Driver</a>
    <a href="koto_support.html">🆘 Support</a>
    <a href="koto_notification.html">🔔 Notifications</a>
    <a href="koto_setting.html" class="active">⚙️ Settings</a>
    <a href="index.html">🏠 Back to Home</a>
  </div>


  <!-- Main Content -->
  <div class="main-content">
    <h2>🔔 Latest Notifications</h2>
    <div id="notificationList"></div>
    <p class="no-notifications" id="noNotifications">No new notifications at the moment.</p>
  </div>

  <script>
    // Sample notifications data
    const notifications = [
      {
        title: "Route Change Alert",
        message: "Tomorrow’s Kotoli–Kolhapur bus will start at 7:30 AM instead of 7:45 AM.",
       
      },
      {
        title: "Bus Maintenance Update",
        message: "Bus No. MH-GJ 4820 will be unavailable on 30th Oct for routine maintenance.",
        
      },
      {
        title: "Safety Reminder",
        message: "All students are requested to carry their ID cards while boarding the bus.",
       
      }
    ];

    const listContainer = document.getElementById("notificationList");
    const noNotifications = document.getElementById("noNotifications");

    if (notifications.length > 0) {
      noNotifications.style.display = "none";
      notifications.forEach(note => {
        const card = document.createElement("div");
        card.classList.add("notification-card");
        card.innerHTML = `
          <h5>${note.title}</h5>
          <p>${note.message}</p>
          <small>${note.date}</small>
        `;
        listContainer.appendChild(card);
      });
    }
  </script>

</body>
</html>
