<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Transport Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }
    .card h3 {
      font-size: 1.8rem;
      margin: 0;
    }
    .route-payments {
      margin-top: 30px;
    }
    .route-payments h4 {
      margin-bottom: 15px;
    }
    .list-group-item {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="mb-4 text-center">📊 Bus Transport Dashboard</h2>

    <!-- Top Cards -->
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card text-center p-3 bg-primary text-white">
          <h5>Present Students</h5>
          <h3>120</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center p-3 bg-success text-white">
          <h5>Driver</h5>
          <h3>1</h3>
          <p class="mb-0">Name: Sandeep Garule</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center p-3 bg-warning text-dark">
          <h5>Present Bus</h5>
          <h3>1</h3>
        </div>
      </div>
    </div>

    <!-- Route Wise Payment -->
    <div class="route-payments">
      <h4>💰 Route-wise Payment</h4>
      <ul class="list-group">
        <li class="list-group-item">Senapati-Kapashi <span>₹23,000</span></li>
        <li class="list-group-item">Bastawade<span>₹20,000</span></li>
        <li class="list-group-item">Kenavade <span>₹19,000</span></li>
        <li class="list-group-item">Khebavade <span>₹18,000</span></li>
        <li class="list-group-item">D-Vadagaon <span>₹17,000</span></li>
        <li class="list-group-item">Girgaon <span>₹16,000</span></li>
        <li class="list-group-item">Pachagon <span>₹15,000</span></li>
        
      </ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
