<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Live Tracking - Radhanagari Route</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body { background: #eef2f3; font-family: 'Segoe UI'; }
.navbar { background: linear-gradient(90deg, #2f4f4f, #3b7a57); }
.navbar .navbar-brand { color: white; font-weight: 600; }
.card { border-radius: 15px; box-shadow: 0 5px 12px rgba(0,0,0,0.1); }
#map { width: 100%; height: 320px; border-radius: 10px; margin-top: 15px; }
.btn-green { background: #198754; color: white; }
.btn-grey { background: #6c757d; color: white; }
.badge-status { padding: 6px 10px; border-radius: 8px; }
</style>
</head>

<body>

<nav class="navbar">
  <div class="container-fluid">
    <span class="navbar-brand">👨‍✈️ Radhanagari Route - Driver Dashboard</span>
  </div>
</nav>

<div class="container mt-4">
  <div class="card p-4">

    <h4 class="text-center text-success mb-3">Mr. Ananda Patil</h4>

    <p><strong>🚌 Bus No:</strong> MH-14 CW 9599</p>
    <p><strong>📍 Route:</strong> Radhanagari ➝ Kolhapur</p>
    <p><strong>📞 Mobile:</strong> 7057209899</p>

    <div class="text-center">
      <button id="startBtn" class="btn btn-green me-2">▶️ Start Live Sharing</button>
      <button id="stopBtn" class="btn btn-grey" disabled>⏹ Stop Sharing</button>
      <a href="radha_driver_details.html" target="_blank" class="btn btn-green ms-2">👁 View Admin Map</a>
    </div>

    <div id="map"></div>

    <div class="text-center mt-3">
      <span id="statusBadge" class="badge bg-secondary badge-status">Inactive</span>
      <p id="statusText">📍 Location sharing not started.</p>
      <p id="timeStamp"></p>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDfSe0P5e3G0ifXPZaXsWB8knSPVo8payE",
  authDomain: "tracking-bus-29dd8.firebaseapp.com",
  databaseURL: "https://tracking-bus-29dd8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tracking-bus-29dd8",
  storageBucket: "tracking-bus-29dd8.firebasestorage.app",
  messagingSenderId: "733874281179",
  appId: "1:733874281179:web:89873e7f72578c6da34afe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DRIVER ID
const driverId = "7057209899";

// MAP
let map = L.map("map").setView([0, 0], 2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let marker = L.marker([0, 0]).addTo(map);
let pathPoints = [];
let polyline = L.polyline(pathPoints).addTo(map);

let watchId = null;

// INTERNET CHECK
function checkInternet() {
  if (!navigator.onLine) {
    alert("No Internet ❌");
    return false;
  }
  return true;
}

// START
startBtn.onclick = () => {

  if (!navigator.geolocation) {
    alert("Geolocation not supported ❌");
    return;
  }

  statusText.textContent = "⏳ Fetching location...";

  watchId = navigator.geolocation.watchPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const now = new Date().toLocaleTimeString();

    marker.setLatLng([lat, lng]);
    map.setView([lat, lng], 15);

    pathPoints.push([lat, lng]);
    polyline.setLatLngs(pathPoints);

    if (!checkInternet()) return;

    db.ref("drivers/" + driverId).update({
      lat, lng, time: now, timestamp: Date.now(), status: "active"
    });

    statusBadge.className = "badge bg-success";
    statusBadge.textContent = "Active";
    statusText.textContent = `🟢 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    timeStamp.textContent = `⏱ ${now}`;

  }, showError);

  startBtn.disabled = true;
  stopBtn.disabled = false;
};

// STOP
stopBtn.onclick = () => {

  if (watchId) navigator.geolocation.clearWatch(watchId);

  db.ref("drivers/" + driverId).update({ status: "inactive" });

  statusBadge.className = "badge bg-secondary";
  statusBadge.textContent = "Inactive";
  statusText.textContent = "🔴 Sharing stopped.";

  startBtn.disabled = false;
  stopBtn.disabled = true;
};

// ERROR
function showError(error) {
  alert("GPS Error: " + error.message);
}
</script>

</body>
</html>
