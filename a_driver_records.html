<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Management & Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body { font-family: 'Poppins', sans-serif; margin:0; display:flex; background:#f4f6f8; }
.sidebar { width:250px; height:100vh; background:#1f1f2e; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; }
.sidebar a { text-decoration:none; color:white; padding:12px 15px; margin:6px 0; border-radius:8px; background:#2c2c3d; font-weight:500; display:flex; justify-content:space-between; }
.sidebar a.active, .sidebar a:hover { background:#4cd137; color:#1f1f2e; }
.sidebar .back-home { margin-top:auto; background:#3a3b4c; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); }
.card{ border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1); margin-bottom:20px; }
input, select, button { border-radius:6px; }
button, .btn { font-weight:500; }
.img-preview { width:50px; height:50px; object-fit:cover; border-radius:50%; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🚌 Transport</h2><br>
  <a href="a_driver_records.html" class="active">Driver Details</a>
  <a href="a_maintenance.html">Maintenance</a>
  <a href="a_bus_schedule.html">Bus Schedule</a>
  
  <a href="admin_dashbord.html" class="back-home">🚪 Home</a>
</div>

<div class="main-content">
  <h2>👨‍✈️ Driver Records & Attendance</h2>

  <!-- Add Driver Form -->
  <div class="card p-3">
    <h5>Add / Update Driver (Gargoti-Kolhapur)</h5>
    <form id="driverForm">
      <div class="row g-2 align-items-center">
        <div class="col-md-2"><input type="text" id="driverName" class="form-control" placeholder="Driver Name" required></div>
        <div class="col-md-2"><input type="text" id="driverLicense" class="form-control" placeholder="License No." required></div>
        <div class="col-md-2"><input type="text" id="driverPhone" class="form-control" placeholder="Phone No." required></div>
        <div class="col-md-2"><input type="number" id="driverSalary" class="form-control" placeholder="Salary" required></div>
        <div class="col-md-2"><input type="file" id="driverPhoto" accept="image/*" class="form-control"></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add / Update Driver</button></div>
      </div>
    </form>
  </div>

  <!-- Driver Table with Attendance -->
  <div class="card p-3">
    <input type="text" id="searchDriver" class="form-control mb-2" placeholder="Search Driver...">
    <table class="table table-bordered table-striped" id="driverTable">
      <thead class="table-dark">
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>License No.</th>
          <th>Phone</th>
          <th>Assigned Bus</th>
          <th>Salary</th>
          <th>Leaves (Month)</th>
          <th>Record Attendance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let driverData = JSON.parse(localStorage.getItem('driverData')) || [];
let attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || [];
const filterBus = "Gargoti-Kolhapur";

// Render driver table
function renderDriverTable(){
  const tbody = document.querySelector('#driverTable tbody');
  tbody.innerHTML = '';
  const filteredDrivers = driverData.filter(d => d.bus === filterBus);

  if(!filteredDrivers.length){
    tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">No drivers for ${filterBus}</td></tr>`;
    return;
  }

  filteredDrivers.forEach(d=>{
    const driverAtt = attendanceData.filter(a => a.license === d.license);
    const leavesText = driverAtt.map(a => `${a.month}: ${a.leaves}`).join(', ') || '-';

    tbody.innerHTML += `<tr>
      <td>${d.photo? `<img src="${d.photo}" class="img-preview">` : ''}</td>
      <td>${d.name}</td>
      <td>${d.license}</td>
      <td>${d.phone}</td>
      <td>${d.bus}</td>
      <td>${d.salary}</td>
      <td>${leavesText}</td>
      <td>
        <input type="month" class="form-control monthInput" data-license="${d.license}">
        <input type="number" class="form-control leavesInput mt-1" data-license="${d.license}" placeholder="Leaves">
        <button class="btn btn-success btn-sm mt-1 w-100" onclick="saveAttendance('${d.license}')">Save</button>
      </td>
      <td>
        <button class="btn btn-warning btn-sm" onclick="editDriver('${d.license}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDriver('${d.license}')">Delete</button>
      </td>
    </tr>`;
  });
}

// Add/Update Driver
document.getElementById('driverForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('driverName').value;
  const license = document.getElementById('driverLicense').value;
  const phone = document.getElementById('driverPhone').value;
  const salary = document.getElementById('driverSalary').value;
  const photoInput = document.getElementById('driverPhoto');
  const bus = filterBus;

  if(photoInput.files && photoInput.files[0]){
    const reader = new FileReader();
    reader.onload = function(e){
      saveDriver({name,license,phone,bus,salary,photo:e.target.result});
    };
    reader.readAsDataURL(photoInput.files[0]);
  } else saveDriver({name,license,phone,bus,salary,photo:null});
});

function saveDriver(driver){
  const idx = driverData.findIndex(d=>d.license===driver.license);
  if(idx>=0) driverData[idx] = driver;
  else driverData.push(driver);

  localStorage.setItem('driverData', JSON.stringify(driverData));
  renderDriverTable();
  document.getElementById('driverForm').reset();
}

function editDriver(license){
  const d = driverData.find(d => d.license===license);
  if(!d) return;
  document.getElementById('driverName').value = d.name;
  document.getElementById('driverLicense').value = d.license;
  document.getElementById('driverPhone').value = d.phone;
  document.getElementById('driverSalary').value = d.salary;
}

function deleteDriver(license){
  const idx = driverData.findIndex(d=>d.license===license);
  if(idx===-1) return;
  if(confirm('Are you sure to delete this driver?')){
    driverData.splice(idx,1);
    attendanceData = attendanceData.filter(a=>a.license!==license);
    localStorage.setItem('driverData', JSON.stringify(driverData));
    localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
    renderDriverTable();
  }
}

// Attendance save
function saveAttendance(license){
  const month = document.querySelector(`.monthInput[data-license="${license}"]`).value;
  const leaves = document.querySelector(`.leavesInput[data-license="${license}"]`).value;
  if(!month) return alert('Select month!');
  const existing = attendanceData.find(a => a.license===license && a.month===month);
  if(existing) existing.leaves = leaves;
  else attendanceData.push({license, month, leaves});
  localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
  renderDriverTable();
}

// Search
document.getElementById('searchDriver').addEventListener('input', function(){
  const val = this.value.toLowerCase();
  const filtered = driverData.filter(d => 
    d.bus===filterBus && (d.name.toLowerCase().includes(val) || d.license.toLowerCase().includes(val))
  );
  renderDriverTable();
});

renderDriverTable();
</script>

</body>
</html>
