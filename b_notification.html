<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radhanagari Notifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background-color: #f4f6f8; display: flex; margin:0; }
.sidebar { width:250px; height:100vh; background:#3a3b3c; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; }
.sidebar h2 { color:#4cd137; text-align:center; margin-bottom:30px; font-size:20px; }
.sidebar a { text-decoration:none; color:white; padding:12px; margin:6px 0; border-radius:8px; background:#4d4d4d; text-align:center; transition:0.3s; font-weight:500; }
.sidebar a:hover { background:#4cd137; color:#1e1e2f; transform:scale(1.05); }
.sidebar a.active { background:#4cd137; color:#1e1e2f; }
.sidebar .back-home { margin-top:auto; background:#34495e; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.sidebar .back-home:hover { background:#1abc9c; color:#2c3e50; }

.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); }
.table-container { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
h2 { text-align:center; margin-bottom:20px; }

.add-btn { background:#27ae60; color:white; border:none; border-radius:6px; padding:10px 20px; font-weight:500; cursor:pointer; }
.add-btn:hover { background:#1e8449; }

.delete-btn { background:#e74c3c; color:white; border:none; border-radius:6px; padding:10px 20px; font-weight:500; cursor:pointer; }
.delete-btn:hover { background:#c0392b; }

textarea, input { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; margin-top:8px; }

.notification-card { background:#ecf0f1; padding:15px; border-left:5px solid #4cd137; border-radius:8px; margin-bottom:12px; }
.notification-card h5 { margin:0; color:#2c3e50; }
.notification-card p { margin:5px 0 0; color:#555; font-size:14px; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🚌 Radhanagari Bus</h2><br>
  <a href="b_regi_no2.html">Student Records</a>
  <a href="b_atten_no2.html">Attendance</a>
  <a href="b_bus_schedule.html">Bus Schedule</a>
  <a href="b_notification.html" class="active">Notifications</a>
  
  <hr style="border-color: rgba(255,255,255,0.2);">
  <a href="admin_dashbord.html" class="back-home">⬅️ Back to Home</a>
</div>

<div class="main-content">
  <div class="table-container">
    <h2>📢 Admin Notifications</h2>

    <form id="notificationForm">
      <div class="mb-3">
        <label><b>Notification Title:</b></label>
        <input type="text" id="notifTitle" placeholder="Enter notification title" required>
      </div>
      <div class="mb-3">
        <label><b>Message:</b></label>
        <textarea id="notifMessage" rows="3" placeholder="Write message..." required></textarea>
      </div>
      <button type="submit" class="add-btn">➕ Add Notification</button>
    </form>

    <hr>

    <h4 class="mt-4 mb-3">Recent Notifications</h4>
    <div id="notifList"></div>

    <button class="delete-btn mt-3" onclick="clearAll()">🗑️ Clear All</button>
  </div>
</div>

<script>
const notifList = document.getElementById('notifList');
const form = document.getElementById('notificationForm');
const STORAGE_KEY = 'radhaNotifications'; // Updated localStorage key for Radhanagari

function loadNotifications() {
  const notifications = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  notifList.innerHTML = notifications.length
    ? notifications.map((n, i) => `
        <div class="notification-card">
          <h5>${i + 1}. ${n.title}</h5>
          <p>${n.message}</p>
          <small><i>${n.date}</i></small>
        </div>
      `).join('')
    : '<p class="text-muted text-center">No notifications yet.</p>';
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const title = document.getElementById('notifTitle').value.trim();
  const message = document.getElementById('notifMessage').value.trim();
  if (!title || !message) return alert('Please fill all fields.');

  const newNotif = {
    title,
    message,
    date: new Date().toLocaleString()
  };
  
  const notifications = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  notifications.unshift(newNotif);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notifications));
  
  form.reset();
  loadNotifications();
});

function clearAll() {
  if (confirm('Clear all notifications?')) {
    localStorage.removeItem(STORAGE_KEY);
    loadNotifications();
  }
}

window.onload = loadNotifications;
</script>
</body>
</html>
