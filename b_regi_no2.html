<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Radhanagari Route Student Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background-color: #f4f6f8; display: flex; margin:0; }
.sidebar { width:250px; height:100vh; background:#3a3b3c; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; }
.sidebar h2 { color:#4cd137; text-align:center; margin-bottom:30px; font-size:20px; }
.sidebar a { text-decoration:none; color:white; padding:12px; margin:6px 0; border-radius:8px; background:#4d4d4d; text-align:center; transition:0.3s; font-weight:500; }
.sidebar a:hover { background:#4cd137; color:#1e1e2f; transform:scale(1.05); }
.sidebar .back-home { margin-top:auto; background:#34495e; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.sidebar .back-home:hover { background:#1abc9c; color:#2c3e50; }
.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); }
.table-container { background:white; border-radius:12px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
h2 { text-align:center; margin-bottom:20px; }
.action-btns { display:flex; justify-content:flex-end; gap:10px; margin-bottom:15px; }
button { border:none; border-radius:6px; padding:8px 15px; color:white; font-weight:500; cursor:pointer; }
.delete-btn { background:#e74c3c; } .delete-btn:hover { background:#c0392b; }
.print-btn { background:#27ae60; } .print-btn:hover { background:#1e8449; }
.download-btn { background:#3498db; } .download-btn:hover { background:#2e86c1; }
.checkbox-col { text-align:center; }
a.buspass-btn { background:#ff9f43; color:white; padding:5px 10px; border-radius:6px; text-decoration:none; transition:0.3s; }
a.buspass-btn:hover { background:#e67e22; color:white; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🚌 Radhanagari Route</h2>
  <a href="b_regi_no2.html" class="active">Student Records</a>
  <a href="b_atten_no2.html">Attendance</a>
  <a href="b_bus_schedule.html">Bus Schedule</a>
  <hr style="border-color: rgba(255,255,255,0.2);">
  <a href="admin_dashbord.html" class="back-home">⬅️ Back to Home</a>
</div>

<div class="main-content">
  <div class="table-container">
    <h2>Radhanagari Route - Registered Students</h2>
    <div class="action-btns">
      <button class="print-btn" onclick="window.print()">🖨️ Print</button>
      <button class="download-btn" onclick="downloadCSV()">⬇️ Download CSV</button>
      <button class="delete-btn" onclick="deleteSelected()">🗑️ Delete Selected</button>
    </div>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle" id="studentTable">
        <thead class="table-dark">
          <tr>
            <th class="checkbox-col"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
            <th>#</th>
            <th>Student Name</th>
            <th>College</th>
            <th>Department</th>
            <th>Year/Class</th>
            <th>Mobile</th>
            <th>Parent Mobile</th>
            <th>Aadhar</th>
            <th>Address</th>
            <th>Bus Route</th>
            <th>Collection Stop</th>
            <th>Fees (₹)</th>
            <th>Payment Date</th>
            <th>Receipt No</th>
            <th>Photo</th>
            <th>Bus Pass</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function displayStudentData() {
  const tableBody = document.getElementById('studentTableBody');
  const data = JSON.parse(localStorage.getItem("b_regi_no2")) || [];

  if (data.length === 0) {
    tableBody.innerHTML = `<tr><td colspan="17" class="text-center text-muted">No records found for Radhanagari route</td></tr>`;
    return;
  }

  let rows = "";
  data.forEach((student, index) => {
    rows += `<tr>
      <td class="checkbox-col"><input type="checkbox" class="select-student" data-index="${index}"></td>
      <td>${index + 1}</td>
      <td>${student.name}</td>
      <td>${student.college}</td>
      <td>${student.dept}</td>
      <td>${student.year}</td>
      <td>${student.mobile}</td>
      <td>${student.parentMobile}</td>
      <td>${student.aadhar}</td>
      <td>${student.address}</td>
      <td>${student.busRoute}</td>
      <td>${student.busStop}</td>
      <td>${student.fees}</td>
      <td>${student.date}</td>
      <td>${student.receipt}</td>
      <td><img src="${student.photo || 'assets/images/default_user.png'}" width="50" height="50" style="border-radius:50%; object-fit:cover;"></td>
      <td><a href="radha_bus_pass.html" class="buspass-btn" target="_blank">View Pass</a></td>
    </tr>`;
  });

  tableBody.innerHTML = rows;
}

window.onload = displayStudentData;

function toggleAll(source) {
  const checkboxes = document.querySelectorAll('.select-student');
  checkboxes.forEach(cb => cb.checked = source.checked);
}

function deleteSelected() {
  const data = JSON.parse(localStorage.getItem("b_regi_no2")) || [];
  const selected = document.querySelectorAll(".select-student:checked");
  if (selected.length === 0) { alert("Select at least one record."); return; }
  if (!confirm("Are you sure you want to delete selected records?")) return;

  const newData = data.filter((_, i) => ![...selected].some(cb => cb.dataset.index == i));
  localStorage.setItem("b_regi_no2", JSON.stringify(newData));
  alert("Selected Radhanagari records deleted successfully!");
  displayStudentData();
}

function downloadCSV() {
  const data = JSON.parse(localStorage.getItem("b_regi_no2")) || [];
  if (data.length === 0) { alert("No Radhanagari data to download."); return; }

  const headers = "Name,College,Department,Year,Mobile,Parent Mobile,Aadhar,Address,Bus Route,Bus Stop,Fees,Payment Date,Receipt No";
  const rows = data.map(d => `${d.name},${d.college},${d.dept},${d.year},${d.mobile},${d.parentMobile},${d.aadhar},${d.address},${d.busRoute},${d.busStop},${d.fees},${d.date},${d.receipt}`).join("\n");

  const blob = new Blob([headers + "\n" + rows], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "radhanagari_student_data.csv";
  a.click();
}
</script>
</body>
</html>
