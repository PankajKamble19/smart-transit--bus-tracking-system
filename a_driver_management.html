<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Driver Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body { font-family: 'Poppins', sans-serif; margin:0; display:flex; background:#f4f6f8; transition:0.3s; }
.sidebar { width:250px; height:100vh; background:#1f1f2e; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; overflow-y:auto; }
.sidebar h2 { color:#4cd137; text-align:center; margin-bottom:30px; font-size:22px; font-weight:bold; }
.sidebar a { text-decoration:none; color:white; padding:12px 15px; margin:6px 0; border-radius:8px; background:#2c2c3d; transition:0.3s; font-weight:500; display:flex; justify-content:space-between; cursor:pointer; }
.sidebar a.active, .sidebar a:hover { background:#4cd137; color:#1f1f2e; transform:scale(1.02); }
.submenu { display:none; flex-direction: column; padding-left:15px; }
.submenu a { background:#3a3b4c; font-size:0.95rem; margin:3px 0; }
.sidebar .back-home { margin-top:auto; background:#3a3b4c; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.sidebar .back-home:hover { background:#1abc9c; color:#fff; }

.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); transition:0.3s; }
h2 { text-align:center; margin-bottom:20px; }
.card{ border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1); margin-bottom:20px; }
input, select, button { border-radius:6px; }
button, .btn { font-weight:500; }
.btn-sm { font-size:0.85rem; }

.table img { width:50px; height:50px; border-radius:50%; object-fit:cover; }

body.dark-mode{ background:#121212; color:#eaeaea;}
body.dark-mode .main-content{ background:#1e1e1e; color:#eaeaea;}
body.dark-mode .sidebar { background:#222; }
body.dark-mode .sidebar a { background:#2c2c3d; color:#eaeaea; }
body.dark-mode .sidebar a.active, body.dark-mode .sidebar a:hover { background:#4cd137; color:#1e1e2e; }

.mode-toggle{ font-size:24px; cursor:pointer; position:fixed; bottom:20px; right:20px; background:#4cd137; color:#1f1f2e; padding:6px 12px; border-radius:50%; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚌 Transport</h2>

  <a href="#" class="active">🏠 Home</a>

  <!-- Bus List submenu -->
  <a onclick="toggleMenu('busListMenu')">🚌 Bus List ▾</a>
  <div class="submenu" id="busListMenu">
    <a href="bus_no1.html">🚌 Bus No. 1</a>
     <a href="bus_no2.html">🚌 Bus No. 2</a>
      <a href="bus_no3.html">🚌 Bus No. 3</a>
      <a href="bus_no4.html">🚌 Bus No. 4</a>
      <a href="bus_no5.html">🚌 Bus No. 5</a>
      <a href="bus_no6.html">🚌 Bus No. 6</a>
      <a href="bus_no7.html">🚌 Bus No. 7</a>
      <a href="bus_no8.html">🚌 Bus No. 8</a>
      <a href="bus_no9.html">🚌 Bus No. 9</a>
      <a href="bus_no10.html">🚌 Bus No. 10</a>
  </div>

   <a href="a_bus_management.html">🚍 Bus Management</a>
  <a href="admin_dashbord.html" class="back-home">🚪 Home</a>
</div>

<!-- Main Content -->
<div class="main-content">
  <h2>👨‍✈️ Driver Management</h2>
  
  <div class="card p-3">
    <h5>Add / Update Driver</h5>
    <form id="driverForm">
      <div class="row g-2">
        <div class="col-md-2"><input type="text" id="driverName" class="form-control" placeholder="Driver Name" required></div>
        <div class="col-md-2"><input type="text" id="driverLicense" class="form-control" placeholder="License No." required></div>
        <div class="col-md-2"><input type="text" id="driverPhone" class="form-control" placeholder="Phone No." required></div>
        <div class="col-md-2"><input type="text" id="driverBus" class="form-control" placeholder="Assigned Bus" required></div>
        <div class="col-md-2"><input type="number" id="driverSalary" class="form-control" placeholder="Salary" required></div>
        <div class="col-md-2"><input type="file" id="driverPhoto" class="form-control" accept="image/*"></div>
      </div>
      <div class="mt-2">
        <button type="submit" class="btn btn-primary w-100">Add / Update Driver</button>
      </div>
    </form>
  </div>

  <div class="card p-3">
    <div class="d-flex justify-content-between mb-2">
      <input type="text" id="searchDriver" class="form-control w-50" placeholder="Search Driver...">
      <div>
        <button class="btn btn-success btn-sm" id="exportPdf">Export PDF</button>
        <button class="btn btn-secondary btn-sm" onclick="window.print()">Print</button>
      </div>
    </div>

    <table class="table table-bordered table-striped" id="driverTable">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>License</th>
          <th>Phone</th>
          <th>Bus</th>
          <th>Salary</th>
          <th>Photo</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<span class="mode-toggle" id="modeToggle">🌙</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Toggle submenu
function toggleMenu(id){
  const menu = document.getElementById(id);
  menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
}

// Dark mode toggle
document.getElementById("modeToggle").addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  document.getElementById("modeToggle").textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
});

// Driver management
let driverData = JSON.parse(localStorage.getItem('driverData')) || [];

function renderDriverTable(data=driverData){
  const tbody = document.querySelector('#driverTable tbody');
  tbody.innerHTML = '';
  if(!data.length){
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No drivers added</td></tr>';
    return;
  }
  data.forEach((driver,index)=>{
    tbody.innerHTML += `<tr>
      <td>${driver.name}</td>
      <td>${driver.license}</td>
      <td>${driver.phone}</td>
      <td>${driver.bus}</td>
      <td>${driver.salary}</td>
      <td>${driver.photo ? `<img src="${driver.photo}">` : ''}</td>
      <td>
        <button class="btn btn-warning btn-sm" onclick="editDriver(${index})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDriver(${index})">Delete</button>
      </td>
    </tr>`;
  });
}

document.getElementById('driverForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('driverName').value;
  const license = document.getElementById('driverLicense').value;
  const phone = document.getElementById('driverPhone').value;
  const bus = document.getElementById('driverBus').value;
  const salary = document.getElementById('driverSalary').value;

  const file = document.getElementById('driverPhoto').files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      saveDriver(name, license, phone, bus, salary, e.target.result);
    };
    reader.readAsDataURL(file);
  } else {
    saveDriver(name, license, phone, bus, salary, '');
  }
});

function saveDriver(name, license, phone, bus, salary, photo){
  const existingIndex = driverData.findIndex(d=>d.license===license);
  if(existingIndex>=0){
    driverData[existingIndex] = {name, license, phone, bus, salary, photo};
  } else {
    driverData.push({name, license, phone, bus, salary, photo});
  }
  localStorage.setItem('driverData', JSON.stringify(driverData));
  renderDriverTable();
  document.getElementById('driverForm').reset();
}

function editDriver(index){
  const d = driverData[index];
  document.getElementById('driverName').value = d.name;
  document.getElementById('driverLicense').value = d.license;
  document.getElementById('driverPhone').value = d.phone;
  document.getElementById('driverBus').value = d.bus;
  document.getElementById('driverSalary').value = d.salary;
}

function deleteDriver(index){
  if(confirm("Are you sure to delete this driver?")){
    driverData.splice(index,1);
    localStorage.setItem('driverData', JSON.stringify(driverData));
    renderDriverTable();
  }
}

// Search
document.getElementById('searchDriver').addEventListener('input', function(){
  const val = this.value.toLowerCase();
  const filtered = driverData.filter(d=>d.name.toLowerCase().includes(val) || d.bus.toLowerCase().includes(val));
  renderDriverTable(filtered);
});

// Export PDF
document.getElementById('exportPdf').addEventListener('click', function(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y=10;
  doc.setFontSize(14);
  doc.text("Driver Management",10,y); y+=10;
  driverData.forEach(d=>{
    doc.text(`Name: ${d.name}, License: ${d.license}, Phone: ${d.phone}, Bus: ${d.bus}, Salary: ${d.salary}`,10,y);
    y+=10;
  });
  doc.save('driver_management.pdf');
});

renderDriverTable();
</script>
</body>
</html>
