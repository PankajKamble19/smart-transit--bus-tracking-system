<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance - Bus Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body { font-family: 'Poppins', sans-serif; margin:0; display:flex; background:#f4f6f8; }
.sidebar { width:250px; height:100vh; background:#1f1f2e; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; }
.sidebar a { text-decoration:none; color:white; padding:12px 15px; margin:6px 0; border-radius:8px; background:#2c2c3d; font-weight:500; display:flex; justify-content:space-between; }
.sidebar a.active, .sidebar a:hover { background:#4cd137; color:#1f1f2e; }
.sidebar .back-home { margin-top:auto; background:#3a3b4c; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); }
.card{ border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1); margin-bottom:20px; }
input, select, button { border-radius:6px; }
button, .btn { font-weight:500; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚌 Transport</h2><br> </br>
  <a href="a_regi_no1.html">Student Records</a>
  <a href="a_driver_records.html">Driver Details</a>
  <a href="a_bus_schedule.html">Bus Schedule</a>
 
  <a href="admin_dashbord.html" class="back-home">🚪 Home</a>
</div>

<!-- Main Content -->
<div class="main-content">
  <h2>🛠️ Maintenance Records</h2>

  <div class="card p-3">
    <h5>Add / Update Maintenance</h5>
    <form id="maintenanceForm">
      <div class="row g-2">
        <div class="col-md-3"><input type="text" id="busNo" class="form-control" placeholder="Bus Number" required></div>
        <div class="col-md-3"><input type="date" id="maintDate" class="form-control" placeholder="Date" required></div>
        <div class="col-md-3"><input type="text" id="issue" class="form-control" placeholder="Issue / Description" required></div>
        <div class="col-md-3"><button type="submit" class="btn btn-primary w-100">Add Maintenance</button></div>
      </div>
    </form>
  </div>

  <div class="card p-3">
    <div class="d-flex justify-content-between mb-2">
      <input type="text" id="searchMaint" class="form-control w-50" placeholder="Search Maintenance...">
      <div>
        <button class="btn btn-success btn-sm" id="exportPdf">Export PDF</button>
        <button class="btn btn-secondary btn-sm" onclick="window.print()">Print</button>
      </div>
    </div>
    <table class="table table-bordered table-striped" id="maintTable">
      <thead class="table-dark">
        <tr>
          <th>Bus No.</th>
          <th>Date</th>
          <th>Issue / Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let maintData = JSON.parse(localStorage.getItem('maintData')) || [];

function renderMaintTable(data=maintData){
  const tbody = document.querySelector('#maintTable tbody');
  tbody.innerHTML = '';
  if(!data.length){ 
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No maintenance records</td></tr>'; 
    return; 
  }
  data.forEach((rec,index)=>{
    tbody.innerHTML += `<tr>
      <td>${rec.busNo}</td>
      <td>${rec.date}</td>
      <td>${rec.issue}</td>
      <td>
        <button class="btn btn-warning btn-sm" onclick="editMaint(${index})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMaint(${index})">Delete</button>
      </td>
    </tr>`;
  });
}

document.getElementById('maintenanceForm').addEventListener('submit', function(e){
  e.preventDefault();
  const busNo = document.getElementById('busNo').value;
  const date = document.getElementById('maintDate').value;
  const issue = document.getElementById('issue').value;

  const existingIndex = maintData.findIndex(m => m.busNo===busNo && m.date===date);
  if(existingIndex>=0) maintData[existingIndex]={busNo,date,issue};
  else maintData.push({busNo,date,issue});

  localStorage.setItem('maintData', JSON.stringify(maintData));
  renderMaintTable();
  this.reset();
});

function editMaint(index){
  const rec = maintData[index];
  document.getElementById('busNo').value = rec.busNo;
  document.getElementById('maintDate').value = rec.date;
  document.getElementById('issue').value = rec.issue;
}

function deleteMaint(index){
  if(confirm('Are you sure to delete this record?')){
    maintData.splice(index,1);
    localStorage.setItem('maintData', JSON.stringify(maintData));
    renderMaintTable();
  }
}

// Search
document.getElementById('searchMaint').addEventListener('input', function(){
  const val = this.value.toLowerCase();
  const filtered = maintData.filter(m => m.busNo.toLowerCase().includes(val) || m.issue.toLowerCase().includes(val));
  renderMaintTable(filtered);
});

// Export PDF
document.getElementById('exportPdf').addEventListener('click', function(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 10;
  doc.setFontSize(14);
  doc.text("Maintenance Records", 10, y); y += 10;
  maintData.forEach(rec => {
    doc.text(`Bus No: ${rec.busNo}, Date: ${rec.date}, Issue: ${rec.issue}`, 10, y);
    y += 10;
  });
  doc.save('maintenance_records.pdf');
});

renderMaintTable();
</script>
</body>
</html>
