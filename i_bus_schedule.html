<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Routes & Schedule</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body { 
  font-family: 'Poppins', sans-serif; 
  margin:0; 
  display:flex; 
  background:#f4f6f8; 
  transition:0.3s; 
}

/* Sidebar */
.sidebar { 
  width:250px; 
  height:100vh; 
  background:#1f1f2e; 
  color:white; 
  display:flex; 
  flex-direction:column; 
  padding:20px; 
  position:fixed; 
  overflow-y:auto; 
}
.sidebar h2 { 
  color:#4cd137; 
  text-align:center; 
  margin-bottom:30px; 
  font-size:22px; 
  font-weight:bold; 
}
.sidebar a { 
  text-decoration:none; 
  color:white; 
  padding:12px 15px; 
  margin:6px 0; 
  border-radius:8px; 
  background:#2c2c3d; 
  transition:0.3s; 
  font-weight:500; 
  display:flex; 
  justify-content:space-between; 
  cursor:pointer; 
}
.sidebar a.active,
.sidebar a:hover { 
  background:#4cd137; 
  color:#1f1f2e; 
  transform:scale(1.02); 
}
.sidebar .back-home {
  margin-top:auto; 
  background:#3a3b4c; 
  padding:10px; 
  border-radius:6px; 
  text-align:center; 
  font-weight:bold;
}

/* Main Content */
.main-content { 
  margin-left:250px; 
  padding:30px; 
  width:calc(100% - 250px); 
  transition:0.3s; 
  min-height:100vh;
}

h2 { text-align:center; margin-bottom:20px; }

table { background: white; }
th { background:#1f1f2e !important; color:white; }

/* Driver Profile */
.profile-wrapper {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.driver-profile img { 
  width:50px; height:50px; 
  border-radius:50%; 
  border:2px solid #4cd137; 
  cursor:pointer; 
}
.driver-info {
  display:none;
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  width:180px;
  font-size:14px;
  position:absolute;
  top:60px;
}
.driver-profile.active .driver-info { display:block; }

/* Dark Mode */
body.dark-mode { background:#121212; color:#eaeaea; }
body.dark-mode .main-content { background:#1e1e1e; color:#eaeaea; }
body.dark-mode .sidebar { background:#222; }
body.dark-mode .sidebar a { background:#2c2c3d; color:white; }
body.dark-mode .sidebar a.active,
body.dark-mode .sidebar a:hover { background:#4cd137; color:#1e1e2e; }
body.dark-mode table { background:#2b2b2b; color:white; }

.mode-toggle { 
  font-size:24px; 
  cursor:pointer; 
  position:fixed; 
  bottom:20px; 
  right:20px; 
  background:#4cd137; 
  color:#121212; 
  padding:8px 14px; 
  border-radius:50%; 
}
</style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🚌 Bus No. 9</h2><br>
    <a href="i_regi_no9.html">Student Records</a>
    <a href="i_atten_no9.html">Attendance</a>
    <a href="i_notification.html">Notifications</a>
    
    <hr style="border-color: rgba(255,255,255,0.2);">
    <a href="admin_dashbord.html" class="back-home">⬅️ Back to Home</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="table-section">
      <h2>🚌 Bus Routes & Schedule</h2>

      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>Stop No.</th>
            <th>Village</th>
            <th>Arrival Time</th>
          </tr>
        </thead>
        <tbody id="busSchedule"></tbody>
      </table>

      <h4 class="text-center mt-4">📍 Route Endpoint: D.Y. Patil College, Kolhapur (Kalamba)</h4>
    </div>

    <!-- Driver Profile -->
    <div class="profile-wrapper">
      <div class="driver-profile" onclick="this.classList.toggle('active')">
        <img src="assets/images/gar_bus.jpeg" alt="Driver Symbol">
        <div class="driver-info">
          <strong>Mr. Dasharath Kumbhar</strong><br>
          Bus Driver<br>
          <b>Experience:</b> 12 Years<br>
          <b>Contact:</b> +91 98765 43210<br>
          <b>Bus No:</b> MH-09 AB 1234
        </div>
      </div>
    </div>
  </div>

  <span class="mode-toggle" id="modeToggle">🌙</span>

<script>
  // Bus Stops Data (UPDATED)
  const busStops = [
    "Yalgud", "Hupari", "Pattan Kodoli", "Mudshingi", "Gandhinagar",
    "Railway Station", "Titan Showroom", "Hocky Stadium"
  ];

  let startTime = new Date();
  startTime.setHours(7, 45, 0);

  const scheduleBody = document.getElementById("busSchedule");

  busStops.forEach((stop, index) => {
    let arrival = new Date(startTime.getTime() + index * 5 * 60000);
    let timeStr = arrival.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    scheduleBody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${stop}</td>
        <td>${timeStr}</td>
      </tr>`;
  });

  // Dark Mode Toggle
  document.getElementById("modeToggle").addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
    document.getElementById("modeToggle").textContent =
      document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
  });
</script>

</body>
</html>
