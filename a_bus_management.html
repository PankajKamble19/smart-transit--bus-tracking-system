<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Bus Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body { font-family: 'Poppins', sans-serif; margin:0; display:flex; background:#f4f6f8; transition:0.3s; }
.sidebar { width:250px; height:100vh; background:#1f1f2e; color:white; display:flex; flex-direction:column; padding:20px; position:fixed; overflow-y:auto; }
.sidebar h2 { color:#4cd137; text-align:center; margin-bottom:30px; font-size:22px; font-weight:bold; }
.sidebar a { text-decoration:none; color:white; padding:12px 15px; margin:6px 0; border-radius:8px; background:#2c2c3d; transition:0.3s; font-weight:500; display:flex; justify-content:space-between; cursor:pointer; }
.sidebar a.active, .sidebar a:hover { background:#4cd137; color:#1f1f2e; transform:scale(1.02); }
.submenu { display:none; flex-direction: column; padding-left:15px; }
.submenu a { background:#3a3b4c; font-size:0.95rem; margin:3px 0; }
.sidebar .back-home { margin-top:auto; background:#3a3b4c; padding:10px; border-radius:6px; text-align:center; font-weight:bold; }
.sidebar .back-home:hover { background:#1abc9c; color:#fff; }

/* Main content */
.main-content { margin-left:250px; padding:30px; width:calc(100% - 250px); transition:0.3s; }
h2 { text-align:center; margin-bottom:20px; }
.card{ border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1); margin-bottom:20px; }
input, select, button { border-radius:6px; }
button, .btn { font-weight:500; }
.btn-sm { font-size:0.85rem; }

/* Dark mode */
body.dark-mode{ background:#121212; color:#eaeaea;}
body.dark-mode .main-content{ background:#1e1e1e; color:#eaeaea;}
body.dark-mode .sidebar { background:#222; }
body.dark-mode .sidebar a { background:#2c2c3d; color:#eaeaea; }
body.dark-mode .sidebar a.active, body.dark-mode .sidebar a:hover { background:#4cd137; color:#1e1e2e; }

.mode-toggle{ font-size:24px; cursor:pointer; position:fixed; bottom:20px; right:20px; background:#4cd137; color:#1f1f2e; padding:6px 12px; border-radius:50%; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚌 Transport</h2>
  <br>

  <a href="a_bus_management.html" class="active">🏠 Home</a>

  <a onclick="toggleMenu('busListMenu')">🚌 Bus List ▾</a>
  <div class="submenu" id="busListMenu">
    <a href="bus_no1.html">🚌 Bus No. 1</a>
     <a href="bus_no2.html">🚌 Bus No. 2</a>
      <a href="bus_no3.html">🚌 Bus No. 3</a>
      <a href="bus_no4.html">🚌 Bus No. 4</a>
      <a href="bus_no5.html">🚌 Bus No. 5</a>
      <a href="bus_no6.html">🚌 Bus No. 6</a>
      <a href="bus_no7.html">🚌 Bus No. 7</a>
      <a href="bus_no8.html">🚌 Bus No. 8</a>
      <a href="bus_no9.html">🚌 Bus No. 9</a>
      <a href="bus_no10.html">🚌 Bus No. 10</a>
  </div>
  <a href="a_driver_records.html">👨‍✈️ Driver Details</a>
  <a href="admin_dashbord.html" class="back-home">🚪 Home</a>
</div>

<!-- Main Content -->
<div class="main-content">
  <h2>🚌 Bus Management</h2>
  
  <div class="card p-3">
    <h5>Add / Update Bus</h5>
    <form id="busForm">
      <div class="row g-2">
        <div class="col-md-3"><input type="text" id="busNo" class="form-control" placeholder="Bus Number" required></div>
        <div class="col-md-2"><input type="number" id="busYear" class="form-control" placeholder="Year" required></div>
        <div class="col-md-3"><input type="text" id="busRoute" class="form-control" placeholder="Route" required></div>
        <div class="col-md-2"><input type="text" id="busDriver" class="form-control" placeholder="Driver Name" required></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add/Update Bus</button></div>
      </div>
    </form>
  </div>

  <div class="card p-3">
    <div class="d-flex justify-content-between mb-2">
      <input type="text" id="searchBus" class="form-control w-50" placeholder="Search Bus...">
      <div>
        <button class="btn btn-success btn-sm" id="exportPdf">Export PDF</button>
        <button class="btn btn-secondary btn-sm" onclick="window.print()">Print</button>
      </div>
    </div>

    <table class="table table-bordered table-striped" id="busTable">
      <thead class="table-dark">
        <tr>
          <th>Bus No.</th>
          <th>Year</th>
          <th>Route</th>
          <th>Driver</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<span class="mode-toggle" id="modeToggle">🌙</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Toggle submenu
function toggleMenu(id){
  const menu = document.getElementById(id);
  menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
}

// Dark mode toggle
document.getElementById("modeToggle").addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  document.getElementById("modeToggle").textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
});

// Bus management
let busData = JSON.parse(localStorage.getItem('busData')) || [];

function renderBusTable(data=busData){
  const tbody = document.querySelector('#busTable tbody');
  tbody.innerHTML = '';
  if(!data.length){ 
    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No buses added</td></tr>'; 
    return; 
  }
  data.forEach((bus,index)=>{
    tbody.innerHTML += `<tr>
      <td>${bus.busNo}</td>
      <td>${bus.year}</td>
      <td>${bus.route}</td>
      <td>${bus.driver}</td>
      <td>
        <button class="btn btn-warning btn-sm" onclick="editBus(${index})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBus(${index})">Delete</button>
      </td>
    </tr>`;
  });
}

document.getElementById('busForm').addEventListener('submit', function(e){
  e.preventDefault();
  const busNo = document.getElementById('busNo').value;
  const year = document.getElementById('busYear').value;
  const route = document.getElementById('busRoute').value;
  const driver = document.getElementById('busDriver').value;

  const existingIndex = busData.findIndex(b => b.busNo===busNo);
  if(existingIndex>=0) busData[existingIndex]={busNo,year,route,driver};
  else busData.push({busNo,year,route,driver});

  localStorage.setItem('busData',JSON.stringify(busData));
  renderBusTable();
  this.reset();
});

function editBus(index){
  const bus=busData[index];
  document.getElementById('busNo').value=bus.busNo;
  document.getElementById('busYear').value=bus.year;
  document.getElementById('busRoute').value=bus.route;
  document.getElementById('busDriver').value=bus.driver;
}

function deleteBus(index){
  if(confirm('Are you sure to delete this bus?')){
    busData.splice(index,1);
    localStorage.setItem('busData',JSON.stringify(busData));
    renderBusTable();
  }
}

document.getElementById('searchBus').addEventListener('input',function(){
  const val=this.value.toLowerCase();
  const filtered=busData.filter(b=>b.busNo.toLowerCase().includes(val)||b.route.toLowerCase().includes(val));
  renderBusTable(filtered);
});

// Export PDF
document.getElementById('exportPdf').addEventListener('click',function(){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF();
  let y=10;
  doc.setFontSize(14);
  doc.text("Bus Management",10,y); y+=10;
  busData.forEach(bus=>{
    doc.text(`Bus No: ${bus.busNo}, Year: ${bus.year}, Route: ${bus.route}, Driver: ${bus.driver}`,10,y);
    y+=10;
  });
  doc.save('bus_management.pdf');
});

renderBusTable();
</script>
</body>
</html>
